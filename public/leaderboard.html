<!DOCTYPE html>
<html lang="en" data-theme="gold">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — Free Fire API</title>
  <style>
    /* ─── CSS Variables / Themes ─────────────────────────────────── */
    @property --fire-gold   { syntax: '<color>'; inherits: true; initial-value: #FFB800; }
    @property --fire-orange { syntax: '<color>'; inherits: true; initial-value: #FF6B00; }
    @property --ember       { syntax: '<color>'; inherits: true; initial-value: #FF9500; }
    @property --fire-red    { syntax: '<color>'; inherits: true; initial-value: #FF2200; }
    @property --border      { syntax: '<color>'; inherits: true; initial-value: rgba(255,184,0,.22); }
    @property --border-bright { syntax: '<color>'; inherits: true; initial-value: rgba(255,184,0,.55); }
    @property --bg-card     { syntax: '<color>'; inherits: true; initial-value: rgba(20,12,0,.82); }

    html {
      transition:
        --fire-gold 1.2s ease, --fire-orange 1.2s ease, --ember 1.2s ease,
        --fire-red  1.2s ease, --border      1.2s ease, --border-bright 1.2s ease,
        --bg-card   1.2s ease;
    }

    /* Gold theme (default) */
    [data-theme="gold"] {
      --fire-gold:    #FFB800; --fire-orange: #FF6B00; --ember:  #FF9500;
      --fire-red:     #FF2200; --border: rgba(255,184,0,.22); --border-bright: rgba(255,184,0,.55);
      --bg-card: rgba(20,12,0,.82);
    }
    [data-theme="halloween"] {
      --fire-gold:    #cc44ff; --fire-orange: #8800cc; --ember:  #aa22ff;
      --fire-red:     #ff00cc; --border: rgba(170,34,255,.25); --border-bright: rgba(204,68,255,.6);
      --bg-card: rgba(10,0,20,.85);
    }
    [data-theme="winter"] {
      --fire-gold:    #00d4ff; --fire-orange: #0088cc; --ember:  #00b4d8;
      --fire-red:     #0055ff; --border: rgba(0,180,216,.22); --border-bright: rgba(0,212,255,.55);
      --bg-card: rgba(0,7,20,.85);
    }
    [data-theme="fire"] {
      --fire-gold:    #ff8800; --fire-orange: #ff4400; --ember:  #ff6600;
      --fire-red:     #cc1100; --border: rgba(255,100,0,.25); --border-bright: rgba(255,136,0,.6);
      --bg-card: rgba(13,2,0,.85);
    }
    [data-theme="jungle"] {
      --fire-gold:    #00ff88; --fire-orange: #00cc55; --ember:  #00dd66;
      --fire-red:     #008833; --border: rgba(0,204,85,.22); --border-bright: rgba(0,255,136,.5);
      --bg-card: rgba(0,13,7,.85);
    }
    [data-theme="crimson"] {
      --fire-gold:    #ff3399; --fire-orange: #cc0055; --ember:  #ff0077;
      --fire-red:     #990033; --border: rgba(255,51,153,.22); --border-bright: rgba(255,51,153,.55);
      --bg-card: rgba(13,0,8,.85);
    }

    /* ─── Reset / Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #050300;
      color: #e8d5a0;
      overflow-x: hidden;
    }

    /* ─── Fire Canvas ────────────────────────────────────────────── */
    #fire-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: .55;
    }

    /* ─── Background slides ──────────────────────────────────────── */
    #bg-slideshow {
      position: fixed; inset: 0; z-index: 0;
    }
    .bg-slide {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      opacity: 0; transition: opacity 2.8s ease;
    }
    .bg-slide::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.4) 60%, rgba(0,0,0,.15) 100%);
    }
    .bg-slide.active { opacity: 1; }

    /* ─── Page wrap ──────────────────────────────────────────────── */
    .page-wrap {
      position: relative; z-index: 2;
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ─── Header ─────────────────────────────────────────────────── */
    .lb-header {
      display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .lb-back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--fire-gold); text-decoration: none; font-size: .85rem;
      cursor: pointer; transition: border-color .3s, background .3s;
    }
    .lb-back-btn:hover {
      border-color: var(--border-bright); background: rgba(255,184,0,.08);
    }
    .lb-title {
      flex: 1;
      font-size: 1.7rem; font-weight: 800; letter-spacing: .04em;
      background: linear-gradient(135deg, var(--fire-gold) 0%, var(--fire-orange) 55%, var(--fire-red) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: none; white-space: nowrap;
    }
    .lb-title svg { display: inline; vertical-align: middle; margin-right: 6px; }

    /* ─── Controls ───────────────────────────────────────────────── */
    .lb-controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      margin-bottom: 20px;
    }
    .lb-select, .lb-toggle-btn, .lb-fetch-btn, .lb-page-btn {
      padding: 8px 14px; border-radius: 8px;
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--fire-gold); font-size: .88rem; cursor: pointer;
      transition: border-color .3s, background .3s;
      outline: none;
      font-family: inherit;
    }
    .lb-select option { background: #0d0800; color: #e8d5a0; }
    .lb-select:hover, .lb-toggle-btn:hover, .lb-page-btn:hover {
      border-color: var(--border-bright);
    }
    .lb-fetch-btn {
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange));
      color: #0d0800; font-weight: 700; border-color: transparent;
      padding: 8px 22px;
    }
    .lb-fetch-btn:hover { filter: brightness(1.15); }
    .lb-fetch-btn:disabled {
      opacity: .5; cursor: not-allowed; filter: none;
    }
    .lb-toggle-group {
      display: flex; gap: 0; border-radius: 8px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .lb-toggle-btn { border-radius: 0; border: none; border-right: 1px solid var(--border); }
    .lb-toggle-btn:last-child { border-right: none; }
    .lb-toggle-btn.active {
      background: linear-gradient(135deg, var(--fire-gold), var(--fire-orange));
      color: #0d0800; font-weight: 700;
    }
    .lb-page-controls {
      display: flex; align-items: center; gap: 8px; margin-left: auto;
    }
    .lb-page-num {
      min-width: 36px; text-align: center;
      color: var(--fire-gold); font-weight: 600; font-size: .9rem;
    }
    .lb-page-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ─── Status bar ─────────────────────────────────────────────── */
    .lb-status {
      font-size: .8rem; color: rgba(232,213,160,.55);
      margin-bottom: 12px; min-height: 18px;
    }

    /* ─── Spinner ────────────────────────────────────────────────── */
    .lb-spinner-wrap {
      display: none; justify-content: center; align-items: center;
      padding: 60px 0; flex-direction: column; gap: 16px;
    }
    .lb-spinner-wrap.visible { display: flex; }
    .lb-spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--fire-gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .lb-spinner-label { color: var(--fire-orange); font-size: .9rem; }

    /* ─── Error ──────────────────────────────────────────────────── */
    .lb-error {
      display: none; padding: 18px 20px; border-radius: 10px;
      background: rgba(255,34,0,.1); border: 1px solid rgba(255,34,0,.3);
      color: #ff9980; font-size: .9rem;
    }
    .lb-error.visible { display: block; }
    .lb-error strong { color: #ffaa88; }

    /* ─── Empty state ────────────────────────────────────────────── */
    .lb-empty {
      display: none; padding: 48px 20px; text-align: center;
      color: rgba(232,213,160,.45); font-size: 1rem;
    }
    .lb-empty.visible { display: block; }
    .lb-empty svg { display: block; margin: 0 auto 12px; opacity: .3; }

    /* ─── Leaderboard table ──────────────────────────────────────── */
    .lb-table-wrap {
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
      backdrop-filter: blur(14px);
      display: none;
    }
    .lb-table-wrap.visible { display: block; }

    /* Summary row */
    .lb-summary {
      padding: 10px 16px;
      font-size: .8rem; color: rgba(232,213,160,.55);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .lb-summary strong { color: var(--fire-gold); }

    /* Table */
    table {
      width: 100%; border-collapse: collapse;
      font-size: .88rem;
    }
    thead th {
      padding: 10px 14px;
      background: rgba(255,184,0,.07);
      color: rgba(232,213,160,.6);
      font-weight: 600; font-size: .75rem; letter-spacing: .08em;
      text-transform: uppercase; text-align: left;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 1;
    }
    thead th:first-child { text-align: center; width: 60px; }
    thead th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(255,184,0,.06);
      transition: background .2s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,184,0,.05); }

    td {
      padding: 10px 14px; vertical-align: middle;
    }
    td:first-child { text-align: center; }
    td.right { text-align: right; }

    /* Position badge */
    .pos-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      font-weight: 700; font-size: .85rem;
      background: rgba(255,184,0,.12);
      color: rgba(232,213,160,.7);
      border: 1px solid var(--border);
    }
    .pos-badge.gold   { background: rgba(255,215,0,.22);  color: #ffd700; border-color: rgba(255,215,0,.5); }
    .pos-badge.silver { background: rgba(192,192,192,.2); color: #d4d4d4; border-color: rgba(192,192,192,.4); }
    .pos-badge.bronze { background: rgba(205,127,50,.2);  color: #cd7f32; border-color: rgba(205,127,50,.4); }

    /* Player info */
    .player-cell { display: flex; align-items: center; gap: 10px; }
    .player-avatar {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,184,0,.2), rgba(255,100,0,.1));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .player-name {
      font-weight: 600; color: #f0dfa8; font-size: .9rem;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .player-name.unknown { color: rgba(232,213,160,.38); font-style: italic; font-weight: 400; }
    .player-id {
      font-size: .72rem; color: rgba(232,213,160,.38);
      font-family: monospace; margin-top: 2px;
    }

    /* Tier badge */
    .tier-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: .74rem; font-weight: 600;
      border: 1px solid;
    }
    .tier-7 { color: #ff2200; border-color: rgba(255,34,0,.4);  background: rgba(255,34,0,.1);  }  /* Grandmaster */
    .tier-6 { color: #ff9900; border-color: rgba(255,153,0,.4); background: rgba(255,153,0,.1); }  /* Heroic */
    .tier-5 { color: #00d4ff; border-color: rgba(0,212,255,.4); background: rgba(0,212,255,.1); }  /* Diamond */
    .tier-4 { color: #aa66ff; border-color: rgba(170,102,255,.4); background: rgba(170,102,255,.1); } /* Platinum */
    .tier-3 { color: #ffd700; border-color: rgba(255,215,0,.4); background: rgba(255,215,0,.1);  }  /* Gold */
    .tier-2 { color: #c0c0c0; border-color: rgba(192,192,192,.4); background: rgba(192,192,192,.1); } /* Silver */
    .tier-1 { color: #cd7f32; border-color: rgba(205,127,50,.4); background: rgba(205,127,50,.1); }  /* Bronze */
    .tier-0 { color: rgba(232,213,160,.4); border-color: rgba(232,213,160,.15); background: transparent; }

    /* Points */
    .pts { font-weight: 700; color: var(--fire-gold); }
    .pts.zero { color: rgba(232,213,160,.3); font-weight: 400; }

    /* Level pill */
    .lvl-pill {
      display: inline-block; padding: 1px 8px; border-radius: 12px;
      font-size: .78rem; font-weight: 600;
      background: rgba(255,184,0,.12); color: var(--fire-orange);
      border: 1px solid var(--border);
    }

    /* ─── Decode warning ─────────────────────────────────────────── */
    .decode-warn {
      margin-top: 14px; padding: 12px 16px; border-radius: 8px;
      background: rgba(255,152,0,.08); border: 1px solid rgba(255,152,0,.22);
      color: #ffcc88; font-size: .8rem; display: none;
    }
    .decode-warn.visible { display: block; }

    /* ─── Raw JSON toggle ────────────────────────────────────────── */
    .raw-section { margin-top: 16px; }
    .raw-toggle {
      background: none; border: none; color: rgba(232,213,160,.45);
      font-size: .78rem; cursor: pointer; padding: 4px 0;
      font-family: inherit; display: flex; align-items: center; gap: 5px;
    }
    .raw-toggle:hover { color: var(--fire-gold); }
    .raw-json {
      display: none; margin-top: 8px;
      background: rgba(0,0,0,.5); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; overflow: auto;
      max-height: 260px; font-size: .72rem; font-family: monospace;
      color: #a8d4a0; line-height: 1.6; white-space: pre;
    }
    .raw-json.visible { display: block; }

    /* ─── Vignette & glow ────────────────────────────────────────── */
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.6) 100%);
    }

    /* ─── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .lb-title { font-size: 1.3rem; }
      td, thead th { padding: 8px 8px; font-size: .8rem; }
      .player-name { max-width: 100px; }
      .player-id { display: none; }
      .lb-controls { flex-direction: column; align-items: stretch; }
      .lb-page-controls { margin-left: 0; }
    }
  </style>
</head>
<body>

<!-- Background slideshow -->
<div id="bg-slideshow">
  <div class="bg-slide" id="bg-a"></div>
  <div class="bg-slide" id="bg-b"></div>
</div>

<div class="vignette"></div>

<!-- Fire canvas -->
<canvas id="fire-canvas"></canvas>

<div class="page-wrap">

  <!-- Header -->
  <div class="lb-header">
    <a href="/api/demo" class="lb-back-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <h1 class="lb-title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="vertical-align:middle;margin-right:6px">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
              fill="var(--fire-gold)" stroke="var(--fire-orange)" stroke-width="1"/>
      </svg>
      Leaderboard
    </h1>
  </div>

  <!-- Controls -->
  <div class="lb-controls">
    <!-- Region -->
    <select class="lb-select" id="sel-region">
      <option value="ME">ME — Middle East</option>
      <option value="IND">IND — India</option>
      <option value="BR">BR — Brazil</option>
      <option value="SG">SG — Singapore</option>
      <option value="ID">ID — Indonesia</option>
      <option value="TH">TH — Thailand</option>
      <option value="TW">TW — Taiwan</option>
      <option value="VN">VN — Vietnam</option>
      <option value="PK">PK — Pakistan</option>
      <option value="BD">BD — Bangladesh</option>
      <option value="US">US — North America</option>
      <option value="RU">RU — Russia</option>
      <option value="CIS">CIS</option>
    </select>

    <!-- Mode BR / CS -->
    <div class="lb-toggle-group">
      <button class="lb-toggle-btn active" id="btn-br" onclick="setMode('BR')">BR</button>
      <button class="lb-toggle-btn"        id="btn-cs" onclick="setMode('CS')">CS</button>
    </div>

    <!-- Fetch -->
    <button class="lb-fetch-btn" id="fetch-btn" onclick="fetchLeaderboard()">
      &#9654; Fetch
    </button>

    <!-- Page navigation -->
    <div class="lb-page-controls">
      <button class="lb-page-btn" id="btn-prev" onclick="changePage(-1)" disabled>&#8592;</button>
      <span class="lb-page-num" id="page-num">Page 1</span>
      <button class="lb-page-btn" id="btn-next" onclick="changePage(1)"  disabled>&#8594;</button>
    </div>
  </div>

  <div class="lb-status" id="lb-status">Select a region and click Fetch.</div>

  <!-- Spinner -->
  <div class="lb-spinner-wrap" id="spinner">
    <div class="lb-spinner"></div>
    <span class="lb-spinner-label">Fetching leaderboard…</span>
  </div>

  <!-- Error -->
  <div class="lb-error" id="lb-error"></div>

  <!-- Empty -->
  <div class="lb-empty" id="lb-empty">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
      <path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    No entries returned for this region / mode / page.
  </div>

  <!-- Table -->
  <div class="lb-table-wrap" id="lb-table-wrap">
    <div class="lb-summary" id="lb-summary"></div>
    <table id="lb-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Tier</th>
          <th class="right">Points</th>
          <th class="right">Level</th>
        </tr>
      </thead>
      <tbody id="lb-tbody"></tbody>
    </table>
  </div>

  <!-- Decode warning -->
  <div class="decode-warn" id="decode-warn"></div>

  <!-- Raw JSON -->
  <div class="raw-section" id="raw-section" style="display:none">
    <button class="raw-toggle" onclick="toggleRaw()">
      <span id="raw-arrow">&#9655;</span> Raw response
    </button>
    <pre class="raw-json" id="raw-json"></pre>
  </div>

</div><!-- .page-wrap -->

<script>
// ─── State ──────────────────────────────────────────────────────────
let currentMode = 'BR';
let currentPage = 0;
let lastData    = null;
let rawVisible  = false;

// ─── Background Themes (same set as demo.html) ───────────────────────
const BG_THEMES = [
  { bg: "url('/assets/free-fire-desktop-heroes-pointing-guns-r115t8uj2gis0rf8.jpg')",
    fallback: 'linear-gradient(160deg,#0d0a00 0%,#332800 50%,#886600 85%,#ddac00 100%)',
    colorTheme: 'gold' },
  { bg: "url('/assets/Halloween-Free-Fire-Wallpaper-1024x576.jpeg')",
    fallback: 'linear-gradient(160deg,#070010 0%,#1a0040 50%,#5500bb 85%,#8800ff 100%)',
    colorTheme: 'halloween' },
  { bg: "url('/assets/Winter-FF-1024x576.jpeg')",
    fallback: 'linear-gradient(160deg,#000713 0%,#001840 50%,#0040a0 85%,#00b4d8 100%)',
    colorTheme: 'winter' },
  { bg: "url('/assets/free-fire-season-1-vxesowl5h3j4oc1r.jpg')",
    fallback: 'linear-gradient(160deg,#0d0200 0%,#3d0a00 45%,#c42000 85%,#ff4400 100%)',
    colorTheme: 'fire' },
  { bg: 'linear-gradient(160deg,#000d07 0%,#002810 50%,#007730 85%,#00cc55 100%)',
    colorTheme: 'jungle' },
  { bg: 'linear-gradient(160deg,#0d0008 0%,#36001a 50%,#990040 85%,#ff0066 100%)',
    colorTheme: 'crimson' },
];

// ─── Background Slideshow ────────────────────────────────────────────
let bgIdx = 0, bgActive = 'a';
const bgA = document.getElementById('bg-a');
const bgB = document.getElementById('bg-b');

function applyBg(el, theme) {
  if (theme.bg.startsWith('url(')) {
    const img = new Image();
    const url = theme.bg.slice(5, -2).replace(/['"]/g,'');
    img.onload  = () => { el.style.backgroundImage = theme.bg;   el.style.background = ''; };
    img.onerror = () => { el.style.backgroundImage = '';          el.style.background = theme.fallback || theme.bg; };
    img.src = url;
  } else {
    el.style.backgroundImage = '';
    el.style.background = theme.bg;
  }
}

function nextBg() {
  const theme = BG_THEMES[bgIdx % BG_THEMES.length];
  bgIdx++;
  document.documentElement.setAttribute('data-theme', theme.colorTheme || 'gold');
  if (bgActive === 'a') {
    applyBg(bgB, theme);
    bgB.classList.add('active');
    bgA.classList.remove('active');
    bgActive = 'b';
  } else {
    applyBg(bgA, theme);
    bgA.classList.add('active');
    bgB.classList.remove('active');
    bgActive = 'a';
  }
}

// Start slideshow
applyBg(bgA, BG_THEMES[0]);
bgA.classList.add('active');
bgIdx = 1;
setInterval(nextBg, 8000);

// ─── Fire Canvas ─────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('fire-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  const EMBER_HUE = { base: 38, range: 28 };

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function newParticle() {
    return {
      x:    Math.random() * W,
      y:    H + 10,
      vx:   (Math.random() - .5) * .9,
      vy:   -(Math.random() * 2.2 + 1.1),
      r:    Math.random() * 3.5 + 1,
      life: 0,
      maxLife: Math.random() * 90 + 60,
      hue: EMBER_HUE.base + Math.random() * EMBER_HUE.range,
    };
  }

  for (let i = 0; i < 120; i++) {
    const p = newParticle();
    p.y = Math.random() * H;
    p.life = Math.random() * p.maxLife;
    particles.push(p);
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < 3; i++) particles.push(newParticle());
    particles = particles.filter(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx += (Math.random() - .5) * .12;
      p.life++;
      const t = p.life / p.maxLife;
      const alpha = t < .2 ? t/.2 : (1-t);
      const size  = p.r * (1 - t * .4);
      ctx.beginPath();
      ctx.arc(p.x, p.y, size, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${p.hue},100%,65%,${alpha * .55})`;
      ctx.fill();
      return p.life < p.maxLife && p.y > -20;
    });
    requestAnimationFrame(animate);
  }
  animate();
})();

// ─── Mode toggle ─────────────────────────────────────────────────────
function setMode(m) {
  currentMode = m;
  document.getElementById('btn-br').classList.toggle('active', m === 'BR');
  document.getElementById('btn-cs').classList.toggle('active', m === 'CS');
}

// ─── Page navigation ──────────────────────────────────────────────────
function changePage(delta) {
  const newPage = currentPage + delta;
  if (newPage < 0) return;
  currentPage = newPage;
  fetchLeaderboard();
}

function updatePageUI() {
  document.getElementById('page-num').textContent = `Page ${currentPage + 1}`;
  document.getElementById('btn-prev').disabled = currentPage === 0;
  document.getElementById('btn-next').disabled = false; // always allow next
}

// ─── Fetch ────────────────────────────────────────────────────────────
async function fetchLeaderboard() {
  const region  = document.getElementById('sel-region').value;
  const fetchBtn = document.getElementById('fetch-btn');

  fetchBtn.disabled = true;
  setSpinner(true);
  setError(null);
  setEmpty(false);
  setTable(false);
  document.getElementById('raw-section').style.display = 'none';
  document.getElementById('decode-warn').classList.remove('visible');
  document.getElementById('lb-status').textContent = `Fetching ${region} ${currentMode} page ${currentPage + 1}…`;
  updatePageUI();

  try {
    const url  = `/api/v1/leaderboard?region=${region}&type=${currentMode}&page=${currentPage}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.error || `HTTP ${resp.status}`);
    }

    lastData = data;
    renderLeaderboard(data);
  } catch (err) {
    setError(`<strong>Error:</strong> ${err.message}`);
    document.getElementById('lb-status').textContent = 'Fetch failed.';
  } finally {
    setSpinner(false);
    fetchBtn.disabled = false;
  }
}

// ─── Render ────────────────────────────────────────────────────────────
const TIER_LABELS  = ['—','Bronze','Silver','Gold','Platinum','Diamond','Heroic','Grandmaster'];
const TIER_ICONS   = ['','🥉','🥈','🥇','💎','💠','🔥','👑'];

function posClass(pos) {
  if (pos === 1) return 'gold';
  if (pos === 2) return 'silver';
  if (pos === 3) return 'bronze';
  return '';
}

function avatarEmoji(headpic) {
  const pool = ['🧑‍🦲','👤','🧑','🎖️','🎯','⚔️','🔫','🛡️'];
  return pool[(headpic || 0) % pool.length];
}

function renderLeaderboard(data) {
  const entries = data.response && data.response.entries ? data.response.entries : [];

  if (entries.length === 0) {
    setEmpty(true);
    document.getElementById('lb-status').textContent = `No entries for ${data.region} ${data.type} p${data.page + 1}.`;
    showRaw(data);
    return;
  }

  const tbody = document.getElementById('lb-tbody');
  tbody.innerHTML = '';

  entries.forEach(e => {
    const pc   = posClass(e.position);
    const name = e.nickname || '';
    const id   = e.accountId || '—';
    const pts  = e.rankingPoints;
    const lvl  = e.level;
    const tid  = e.tierId || 0;
    const tier = e.tier   || '—';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="pos-badge ${pc}">${e.position}</span></td>
      <td>
        <div class="player-cell">
          <div class="player-avatar">${avatarEmoji(e.headpic)}</div>
          <div>
            <div class="player-name ${name ? '' : 'unknown'}">${name || 'Unknown Player'}</div>
            <div class="player-id">${id}</div>
          </div>
        </div>
      </td>
      <td><span class="tier-badge tier-${tid}">${TIER_ICONS[tid] || ''} ${tier}</span></td>
      <td class="right"><span class="pts ${pts ? '' : 'zero'}">${pts ? pts.toLocaleString() : '—'}</span></td>
      <td class="right"><span class="lvl-pill">${lvl || '—'}</span></td>
    `;
    tbody.appendChild(tr);
  });

  const region = data.region || document.getElementById('sel-region').value;
  document.getElementById('lb-summary').innerHTML =
    `<span>Region: <strong>${region}</strong> &nbsp;·&nbsp; Mode: <strong>${data.type || currentMode}</strong> &nbsp;·&nbsp; Page: <strong>${(data.page || 0) + 1}</strong></span>
     <span><strong>${entries.length}</strong> entr${entries.length === 1 ? 'y' : 'ies'}</span>`;

  setTable(true);
  document.getElementById('lb-status').textContent =
    `Loaded ${entries.length} entr${entries.length === 1 ? 'y' : 'ies'}. Region: ${region}`;

  // Decode warning
  if (data.decodeError) {
    const dw = document.getElementById('decode-warn');
    dw.textContent = `⚠ Decode warning: ${data.decodeError}`;
    dw.classList.add('visible');
  }

  showRaw(data);
}

// ─── UI helpers ────────────────────────────────────────────────────────
function setSpinner(v) {
  document.getElementById('spinner').classList.toggle('visible', v);
}
function setError(html) {
  const el = document.getElementById('lb-error');
  if (html) { el.innerHTML = html; el.classList.add('visible'); }
  else       { el.classList.remove('visible'); }
}
function setEmpty(v) {
  document.getElementById('lb-empty').classList.toggle('visible', v);
}
function setTable(v) {
  document.getElementById('lb-table-wrap').classList.toggle('visible', v);
}
function showRaw(data) {
  document.getElementById('raw-json').textContent = JSON.stringify(data, null, 2);
  document.getElementById('raw-section').style.display = 'block';
  rawVisible = false;
  document.getElementById('raw-arrow').textContent = '▷';
  document.getElementById('raw-json').classList.remove('visible');
}
function toggleRaw() {
  rawVisible = !rawVisible;
  document.getElementById('raw-json').classList.toggle('visible', rawVisible);
  document.getElementById('raw-arrow').textContent = rawVisible ? '▽' : '▷';
}
</script>
