  <script>
  /* ═══════════════════════════════════════════════════
     ① BACKGROUND ALBUM SLIDESHOW
     — Each theme = image + color palette + ember hue
     — Rotates every 25 s; Spotify album art overrides
  ═══════════════════════════════════════════════════ */

  /*
   * colorTheme → matches [data-theme="…"] in styles.css
   * emberHue   → {base, range} hue for fire canvas particles
   * fallback   → gradient shown when image file missing
   */
  const BG_THEMES = [
    {
      bg:         "url('/assets/free-fire-desktop-heroes-pointing-guns-r115t8uj2gis0rf8.jpg')",
      fallback:   'linear-gradient(160deg,#0d0a00 0%,#332800 50%,#886600 85%,#ddac00 100%)',
      label:      'Golden Squad',
      colorTheme: 'gold',
      emberHue:   { base: 38, range: 28 },
    },
    {
      bg:         "url('/assets/Halloween-Free-Fire-Wallpaper-1024x576.jpeg')",
      fallback:   'linear-gradient(160deg,#070010 0%,#1a0040 50%,#5500bb 85%,#8800ff 100%)',
      label:      'Halloween',
      colorTheme: 'halloween',
      emberHue:   { base: 270, range: 45 },
    },
    {
      bg:         "url('/assets/Winter-FF-1024x576.jpeg')",
      fallback:   'linear-gradient(160deg,#000713 0%,#001840 50%,#0040a0 85%,#00b4d8 100%)',
      label:      'Winter',
      colorTheme: 'winter',
      emberHue:   { base: 190, range: 35 },
    },
    {
      bg:         "url('/assets/free-fire-season-1-vxesowl5h3j4oc1r.jpg')",
      fallback:   'linear-gradient(160deg,#0d0200 0%,#3d0a00 45%,#c42000 85%,#ff4400 100%)',
      label:      'Season 1',
      colorTheme: 'fire',
      emberHue:   { base: 20, range: 30 },
    },
    {
      bg:         'linear-gradient(160deg,#000d07 0%,#002810 50%,#007730 85%,#00cc55 100%)',
      label:      'Jungle',
      colorTheme: 'jungle',
      emberHue:   { base: 110, range: 40 },
    },
    {
      bg:         'linear-gradient(160deg,#0d0008 0%,#36001a 50%,#990040 85%,#ff0066 100%)',
      label:      'Crimson',
      colorTheme: 'crimson',
      emberHue:   { base: 330, range: 40 },
    },
  ];

  // Active ember hue — read by the fire canvas particle system
  let EMBER_HUE = { base: 38, range: 28 };

  const bgSlideshow  = document.getElementById('bg-slideshow');
  const bgThemeBadge = document.getElementById('bg-theme-badge');
  let   bgSlides     = [];
  let   activeSlot   = 0;
  let   activeBgIdx  = 0;
  let   lastBgValue  = '';
  let   autoTimer    = null;
  let   badgeTimer   = null;
  const ROTATE_MS    = 25000;

  // ── Create A/B crossfade slides ──
  function initSlideshow() {
    for (let i = 0; i < 2; i++) {
      const s = document.createElement('div');
      s.className = 'bg-slide';
      bgSlideshow.appendChild(s);
      bgSlides.push(s);
    }
    loadAndApplyTheme(BG_THEMES[0], true);
    startAutoRotate();
  }

  // ── Low-level: set a background CSS value with crossfade ──
  function applyBgDirect(cssValue) {
    if (cssValue === lastBgValue) return;
    lastBgValue = cssValue;
    const next  = (activeSlot + 1) % 2;
    const isUrl = cssValue.startsWith('url(');
    bgSlides[next].style.cssText =
      `background-image:${isUrl ? cssValue : 'none'};` +
      `background:${isUrl ? '' : cssValue};` +
      'background-size:cover;background-position:center;';
    void bgSlides[next].offsetWidth;          // force reflow → enables CSS transition
    bgSlides[next].classList.add('active');
    bgSlides[activeSlot].classList.remove('active');
    activeSlot = next;
  }

  // ── High-level: load theme image (fallback to gradient) + change UI colors ──
  function loadAndApplyTheme(themeObj, skipBadge) {
    if (!themeObj) return;
    applyColorTheme(themeObj.colorTheme, themeObj.emberHue);   // colors first (instant)

    if (themeObj.bg.startsWith('url(')) {
      const url = (themeObj.bg.match(/url\(['"]?([^'")\s]+)['"]?\)/) || [])[1];
      if (!url) { applyBgDirect(themeObj.fallback || themeObj.bg); _badge(themeObj, skipBadge); return; }
      const img = new Image();
      img.onload  = () => { applyBgDirect(themeObj.bg);                         _badge(themeObj, skipBadge); };
      img.onerror = () => { applyBgDirect(themeObj.fallback || themeObj.bg);    _badge(themeObj, skipBadge); };
      img.src = url;
    } else {
      applyBgDirect(themeObj.bg);
      _badge(themeObj, skipBadge);
    }
  }

  function _badge(t, skip) { if (!skip) flashBadge(t.label); }

  // ── Apply CSS color theme + ember hue ──
  function applyColorTheme(themeName, emberHue) {
    document.documentElement.setAttribute('data-theme', themeName || 'fire');
    if (emberHue) EMBER_HUE = emberHue;
  }

  function flashBadge(label) {
    bgThemeBadge.textContent = label;
    bgThemeBadge.classList.add('flash');
    clearTimeout(badgeTimer);

  /* ═══════════════════════════════════════════════════
     ③ SPOTIFY IFRAME API
     Detects track changes → syncs album art to background
     Config: change SPOTIFY_URI to any track / album / playlist
  ═══════════════════════════════════════════════════ */

  // ▶ Free Fire Album — auto-advances through all tracks
  const SPOTIFY_URI = 'spotify:album:2F2ZjH7HJQns03217zo2xi';

  let spotifyController = null;
  let lastTrackUri      = null;

  // Load the Spotify Embed IFrame API
  ;(function () {
    const s = document.createElement('script');
    s.src   = 'https://open.spotify.com/embed-podcast/iframe-api/v1';
    s.async = true;
    document.head.appendChild(s);
  })();

  // Fallback: if Spotify API fails to load within 5 s, inject a plain iframe
  const spotifyFallbackTimer = setTimeout(() => {
    if (!spotifyController) {
      const c = document.getElementById('spotify-embed');
      if (c && !c.querySelector('iframe')) {
        c.innerHTML =
          `<iframe src="https://open.spotify.com/embed/album/2F2ZjH7HJQns03217zo2xi` +
          `?utm_source=generator&theme=0" width="100%" height="152" frameborder="0" ` +
          `allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture" loading="lazy"></iframe>`;
      }
    }
  }, 5000);

  // IFrame API callback (fires when the script loads)
  window.onSpotifyIframeApiReady = function (IFrameAPI) {
    clearTimeout(spotifyFallbackTimer);
    const container = document.getElementById('spotify-embed');
    if (!container) return;

    IFrameAPI.createController(container, { uri: SPOTIFY_URI, width: '100%', height: 152 },
      function (ctrl) {
        spotifyController = ctrl;

        ctrl.addListener('playback_update', function (evt) {
          const d = evt && evt.data;
          if (!d || !d.track) return;
          if (d.track.uri === lastTrackUri) return;   // same track, skip
          lastTrackUri = d.track.uri;

          const images    = d.track.album && d.track.album.images;
          const artUrl    = images && images.length ? images[0].url : null;
          const trackName = d.track.name     || '—';
          const albumName = d.track.album && d.track.album.name ? d.track.album.name : '—';

          showNowPlaying(trackName, albumName, artUrl);
          if (artUrl) setBgFromAlbumArt(artUrl, albumName);

          // Animate spotify bars in header
          document.getElementById('spotify-bars').classList.remove('paused');
          document.getElementById('spotify-label').textContent = 'Playing';
        });
      }
    );
  };

  /* ═══════════════════════════════════════════════════
     Fire Canvas
  ═══════════════════════════════════════════════════ */
  (function () {
    const canvas = document.getElementById('fire-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H, embers = [];
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    function Ember() {
      this.reset = function () {
        this.x = Math.random() * W; this.y = H + 10;
        this.r = 1 + Math.random() * 2.5;
        this.vx = (Math.random() - 0.5) * 0.8;
        this.vy = -(0.6 + Math.random() * 1.4);
        this.life = 0; this.maxL = 180 + Math.random() * 160;
        this.hue = EMBER_HUE.base + Math.random() * EMBER_HUE.range;
      };
      this.reset(); this.life = Math.random() * this.maxL;
    }
    for (let i = 0; i < 55; i++) embers.push(new Ember());
    function tick() {
      ctx.clearRect(0, 0, W, H);
      embers.forEach(e => {
        e.x += e.vx + Math.sin(e.life * 0.05) * 0.3; e.y += e.vy; e.life++;
        if (e.life > e.maxL || e.y < -10) e.reset();
        const prog = e.life / e.maxL;
        const alpha = prog < 0.15 ? prog / 0.15 : 1 - (prog - 0.15) / 0.85;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.r * (1 - prog * 0.4), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${e.hue},100%,${55 + prog * 20}%,${alpha * 0.7})`;
        ctx.shadowBlur = 8; ctx.shadowColor = `hsl(${e.hue},100%,50%)`; ctx.fill();
      });
      requestAnimationFrame(tick);
    }
    tick();
  })();

  /* ═══════════════════════════════════════════════════
     JSON Syntax Highlight
  ═══════════════════════════════════════════════════ */
  function highlight(str) {
    if (typeof str !== 'string') str = JSON.stringify(str, null, 2);
    return str
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, m => {
        if (/^"/.test(m)) return /:$/.test(m) ? `<span class="jk">${m}</span>` : `<span class="js">${m}</span>`;
        if (/true|false/.test(m)) return `<span class="jb">${m}</span>`;
        if (/null/.test(m)) return `<span class="jn">${m}</span>`;
        return `<span class="jnum">${m}</span>`;
      });
  }

  /* ═══════════════════════════════════════════════════
     Rank helpers
  ═══════════════════════════════════════════════════ */
  const BR_RANKS = ['','Bronze','Silver','Gold','Platinum','Diamond','Heroic','Grandmaster'];
  const CS_RANKS = ['','Bronze','Silver','Gold','Platinum','Diamond','Heroic','Grandmaster'];
  function brRankName(n)  { return BR_RANKS[n] || (n ? `Rank ${n}` : '—'); }
  function csRankName(n)  { return CS_RANKS[n] || (n ? `Rank ${n}` : '—'); }
  function rankColor(n) {
    const map = {1:'#CD7F32',2:'#C0C0C0',3:'#FFD700',4:'#00BFFF',5:'#B0E0E6',6:'#FF6B00',7:'#FF00AA'};
    return map[n] || '#7A6040';
  }
  function initials(name) { return name ? name.slice(0,2).toUpperCase() : '?'; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtNum(n) { return n !== undefined && n !== null ? Number(n).toLocaleString() : '—'; }
  function fmtKD(kills, deaths) {
    if (!kills && !deaths) return '—';
    return deaths ? (kills / deaths).toFixed(2) : kills;
  }
  function winRate(wins, games) {
    if (!games) return '—';
    return (wins / games * 100).toFixed(1) + '%';
  }

     Rarity Colors & Item Helpers

  const RARE_COLORS = {
    'White':'#b0b0b0','Green':'#4ade80','Blue':'#60a5fa',
    'Purple':'#a78bfa','Purple_Plus':'#8b5cf6',
    'Orange':'#f97316','Orange_Plus':'#ea580c','Red':'#ef4444','NONE':'#666'
  };
  function rareColor(r) { return RARE_COLORS[r] || '#888'; }
  function rareName(r) { return (r||'').replace('_Plus',' +').replace('NONE','Common'); }
  function itemImg(id) { return `https://raw.githubusercontent.com/starexxx/FFItems/main/assets/icons/${id}.png`; }
  function resolvedName(item) {
    if (!item) return null;
    return item.name || item.itemName || null;
  }
  function resolvedChip(item, fallbackLabel) {
    if (!item) return '';
    const name = item.name || item.itemName || `ID: ${item.id || item.itemId || '?'}`;
    const rare = item.rare || item.itemRare || 'NONE';
    const type = item.type || item.itemType || '';
    const col = rareColor(rare);
    return `<span class="item-chip" style="border-color:${col};color:${col}" title="${esc(type)} · ${rareName(rare)}">${esc(name)}</span>`;
  }
  function timeAgo(ts) {
    if (!ts) return '—';
    const s = Math.floor((Date.now()/1000) - Number(ts));
    if (s < 60) return 'Just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }

    <div class="health-card">
      <div class="health-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--fire-gold)" stroke-width="1.8"><path d="M16 11c1.66 0 3-1.79 3-4s-1.34-4-3-4-3 1.79-3 4 1.34 4 3 4z"/><path d="M8 11c1.66 0 3-1.79 3-4S9.66 3 8 3 5 4.79 5 7s1.34 4 3 4z"/><path d="M8 13c-2.76 0-5 1.79-5 4v2h10v-2c0-2.21-2.24-4-5-4z"/><path d="M16 13c-1.1 0-2.1.29-2.93.78A5.94 5.94 0 0 1 15 17v2h6v-2c0-2.21-2.24-4-5-4z"/></svg>
      </div>
      <div class="health-status-text">Guest credential ready</div>
      <div class="health-meta">
        <span class="health-tag">region: ${esc(data.region || '—')}</span>
        <span class="health-tag">source: ${esc(data.source || '—')}</span>
        <span class="health-tag">uid: ${esc(data.guest?.uid || '—')}</span>
      </div>
    </div>`;
  }

  function renderUidGenerator(data) {
    const items = data.items || [];
    return `
    <div>
      <div class="wishlist-header">UID GENERATOR · ${esc(data.mode || 'random')} · count ${items.length}</div>
      <div class="wishlist-grid">
        ${items.slice(0, 12).map(it => `
          <div class="wishlist-item">
            <div class="wishlist-item-id">${esc(it.uid || '—')}</div>
            <div class="wishlist-item-val">teamXdarks: ${esc(it.teamXdarks)}</div>
            <div class="wishlist-item-label">UID</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  function renderLikeSpam(data) {
    const s = data.summary || {};
    const results = data.results || [];
    return `
    <div class="health-card">
      <div class="health-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="health-status-text">Like Spam Complete</div>
      <div class="health-meta">
        <span class="health-tag">region: ${esc(data.region || '—')}</span>
        <span class="health-tag">uid: ${esc(data.uid || '—')}</span>
        <span class="health-tag" style="color:#22c55e">✓ ${s.success || 0}</span>
        <span class="health-tag" style="color:#ef4444">✗ ${s.failed || 0}</span>
        <span class="health-tag">delay: ${data.delayMs || 0}ms</span>
      </div>
    </div>
    ${results.length > 0 ? `
    <div style="max-height:200px;overflow-y:auto;margin-top:12px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-secondary)">
      ${results.map(r => `<div style="padding:2px 0">${r.ok ? '✅' : '❌'} #${r.index} ${r.error ? '— '+esc(r.error) : ''}</div>`).join('')}
    </div>` : ''}`;
  }

  function renderHealth(data) {
    return `
    <div class="health-card">
      <div class="health-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="health-status-text">${esc(data.status || 'OK')}</div>
      <div class="health-meta">
        ${data.uptimeSec !== undefined ? `<span class="health-tag">Uptime: ${Math.round(data.uptimeSec)}s</span>` : ''}
        ${data.now ? `<span class="health-tag">${new Date(data.now).toLocaleTimeString()}</span>` : ''}
      </div>
    </div>`;
  }

  function renderError(msg) {
    return `
    <div class="error-card">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div class="error-card-title">Request Failed</div>
      <div class="error-card-msg">${esc(msg)}</div>
    </div>`;
  }

  /* ═══════════════════════════════════════════════════
     State & View
  ═══════════════════════════════════════════════════ */
  const richView  = document.getElementById('rich-view');
  const out       = document.getElementById('out');
  const badge     = document.getElementById('status-badge');
  const activeEp  = document.getElementById('active-ep');
  const respTime  = document.getElementById('resp-time');
  let activeBtn   = null;
  let currentView = 'cards';
  let lastData    = null;
  let lastAction  = null;

  const region    = () => document.getElementById('region').value;
  const uid       = () => document.getElementById('uid').value.trim();
  const keyword   = () => document.getElementById('keyword').value.trim();
  const matchmode = () => document.getElementById('matchmode').value;

  const EP_LABELS = {
    account:     'Account',
    br:          'BR Stats',
    cs:          'CS Stats',
    search:      'Search',
    wishlist:    'Wishlist',
    health:      'Health',
    guest:       'Guest Generator',
    likespam:    'Like Spam',
    uidgen:      'UID Generator',
  };

  function setView(v) {
    currentView = v;
    document.getElementById('btn-cards').classList.toggle('active', v === 'cards');
    document.getElementById('btn-json').classList.toggle('active', v === 'json');
    if (v === 'cards') {
      richView.classList.remove('rich-hidden');
      out.classList.add('rich-hidden');
    } else {
      richView.classList.add('rich-hidden');
      out.classList.remove('rich-hidden');
    }
  }

  function buildRichCard(action, data) {
    if (action === 'account')  return renderAccount(data);
    if (action === 'br')       return renderBrStats(data);
    if (action === 'cs')       return renderCsStats(data);
    if (action === 'search')   return renderSearch(data);
    if (action === 'wishlist') return renderWishlist(data);
    if (action === 'health')   return renderHealth(data);
    if (action === 'guest')    return renderGuest(data);
    if (action === 'uidgen')      return renderUidGenerator(data);
    if (action === 'likespam')    return renderLikeSpam(data);
    return `<pre style="color:var(--text-primary);white-space:pre-wrap">${esc(JSON.stringify(data,null,2))}</pre>`;
  }

  async function call(url, action) {
    if (activeBtn) activeBtn.classList.remove('active');
    activeBtn = document.querySelector(`[data-action="${action}"]`);
    if (activeBtn) activeBtn.classList.add('active', 'loading');

    badge.textContent = '…'; badge.className = 'status-badge pending';
    activeEp.textContent = EP_LABELS[action] || '';
    respTime.textContent = '';

    richView.innerHTML = `<div class="rich-loading"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .8s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0"/></svg> Fetching…</div>`;
    out.innerHTML = '<span class="muted">// Sending request…</span>';

    const t0 = Date.now();
    try {
      const res  = await fetch(url);
      const ms   = Date.now() - t0;
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      lastData   = data; lastAction = action;

      if (res.ok) {
        richView.innerHTML = buildRichCard(action, data);
        badge.textContent  = `${res.status} OK`;
        badge.className    = 'status-badge ok';
      } else {
        richView.innerHTML = renderError(data.message || JSON.stringify(data));
        badge.textContent  = `${res.status} ERR`;
        badge.className    = 'status-badge err';
      }
      out.innerHTML = highlight(JSON.stringify(data, null, 2));
      respTime.textContent = `${ms}ms`;
    } catch (e) {
      richView.innerHTML   = renderError(String(e));
      out.innerHTML        = `<span class="err-text">// Error: ${esc(String(e))}</span>`;
      badge.textContent    = 'ERR';
      badge.className      = 'status-badge err';
      respTime.textContent = `${Date.now() - t0}ms`;
    } finally {
      if (activeBtn) activeBtn.classList.remove('loading');
    }
  }

  async function callPost(url, body, action) {
    if (activeBtn) activeBtn.classList.remove('active');
    activeBtn = document.querySelector(`[data-action="${action}"]`);
    if (activeBtn) activeBtn.classList.add('active', 'loading');

    badge.textContent = '…'; badge.className = 'status-badge pending';
    activeEp.textContent = EP_LABELS[action] || '';
    respTime.textContent = '';

    richView.innerHTML = `<div class="rich-loading"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin .8s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0"/></svg> Sending…</div>`;
    out.innerHTML = '<span class="muted">// Sending POST request…</span>';

    const t0 = Date.now();
    try {
      const res  = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const ms   = Date.now() - t0;
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      lastData   = data; lastAction = action;

      if (res.ok) {
        richView.innerHTML = buildRichCard(action, data);
        badge.textContent  = `${res.status} OK`;
        badge.className    = 'status-badge ok';
      } else {
        richView.innerHTML = renderError(data.message || JSON.stringify(data));
        badge.textContent  = `${res.status} ERR`;
        badge.className    = 'status-badge err';
      }
      out.innerHTML = highlight(JSON.stringify(data, null, 2));
      respTime.textContent = `${ms}ms`;
    } catch (e) {
      richView.innerHTML   = renderError(String(e));
      out.innerHTML        = `<span class="err-text">// Error: ${esc(String(e))}</span>`;
      badge.textContent    = 'ERR';
      badge.className      = 'status-badge err';
      respTime.textContent = `${Date.now() - t0}ms`;
    } finally {
      if (activeBtn) activeBtn.classList.remove('loading');
    }
  }

  function copyOutput() {
    const txt = currentView === 'json'
      ? (out.innerText || out.textContent)
      : (lastData ? JSON.stringify(lastData, null, 2) : '');
    navigator.clipboard.writeText(txt).then(() => {
      const lbl = document.getElementById('copy-label');
      lbl.textContent = 'Copied!';
      setTimeout(() => lbl.textContent = 'Copy', 1600);
    });
  }

  function clearOutput() {
    richView.innerHTML = `<div class="rich-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span class="rich-empty-label">Choose an endpoint above to fire a request</span></div>`;
    out.innerHTML = '<span class="muted">// Ready — choose an endpoint above</span>';
    badge.textContent = '—'; badge.className = 'status-badge';
    activeEp.textContent = ''; respTime.textContent = '';
    lastData = null; lastAction = null;
    if (activeBtn) { activeBtn.classList.remove('active'); activeBtn = null; }
  }

  /* ═══════════════════════════════════════════════════
     Actions
  ═══════════════════════════════════════════════════ */
  const enc = encodeURIComponent;
  function runAccount()  { call(`/api/v1/account?region=${enc(region())}&uid=${enc(uid())}`, 'account'); }
  function runBr()       { call(`/api/v1/playerstats?region=${enc(region())}&uid=${enc(uid())}&matchmode=${matchmode()}`, 'br'); }
  function runCs()       { call(`/api/v1/playertcstats?region=${enc(region())}&uid=${enc(uid())}&matchmode=${matchmode()}`, 'cs'); }
  function runSearch()   { call(`/api/v1/search?region=${enc(region())}&keyword=${enc(keyword() || uid())}`, 'search'); }
  function runWishlist() { call(`/api/v1/wishlist?region=${enc(region())}&uid=${enc(uid())}`, 'wishlist'); }
  function runHealth()   { call('/api/health', 'health'); }
  function runGuest()    { call(`/api/guest-generator?region=${enc(region())}`, 'guest'); }
  function runLikeSpam() {
    const r = region(), u = uid();
    const cnt = prompt('How many likes? (1-500)', '10');
    if (!cnt) return;
    const delay = prompt('Delay between requests in ms? (0-5000)', '100');
    if (delay === null) return;
    callPost('/api/like-spam', { region: r, uid: u, count: parseInt(cnt)||10, delayMs: parseInt(delay)||100 }, 'likespam');
  }
  function runUidGen()   { call('/api/uid-generator?mode=random&count=5&length=10&teamXdarks=1', 'uidgen'); }

  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (e.target && ['INPUT', 'TEXTAREA'].includes(e.target.tagName)) {
      if (e.shiftKey) return runBr();
      if (e.ctrlKey || e.metaKey) return runCs();
      return runAccount();
    }
  });
  </script>
</body>
</html>
