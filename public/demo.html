<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Fire API Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="overlay">
      <section class="panel">
        <h1>Free Fire API Demo</h1>
        <p>Test your API quickly from one page.</p>

        <div class="row">
          <label>Region</label>
          <input id="region" value="IND" />
        </div>

        <div class="row">
          <label>UID</label>
          <input id="uid" value="1633864660" />
        </div>

        <div class="buttons">
          <button onclick="runAccount()">Account</button>
          <button onclick="runBr()">BR Stats</button>
          <button onclick="runCs()">CS Stats</button>
          <button onclick="runUidGen()">UID Generator</button>
        </div>

        <pre id="out">Ready.</pre>
      </section>
    </main>

    <script>
      const out = document.getElementById('out');
      const region = () => document.getElementById('region').value.trim();
      const uid = () => document.getElementById('uid').value.trim();

      async function call(url, options) {
        out.textContent = 'Loading...';
        try {
          const res = await fetch(url, options);
          const data = await res.json();
          out.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
          out.textContent = String(e);
        }
      }

      function runAccount() {
        call(`/api/v1/account?region=${encodeURIComponent(region())}&uid=${encodeURIComponent(uid())}`);
      }

      function runBr() {
        call(`/api/v1/playerstats?region=${encodeURIComponent(region())}&uid=${encodeURIComponent(uid())}&matchmode=CAREER`);
      }

      function runCs() {
        call(`/api/v1/playertcstats?region=${encodeURIComponent(region())}&uid=${encodeURIComponent(uid())}&matchmode=CAREER`);
      }

      function runUidGen() {
        call('/api/uid-generator?mode=random&count=3&length=10&teamXdarks=1');
      }
    </script>
  </body>
</html>
